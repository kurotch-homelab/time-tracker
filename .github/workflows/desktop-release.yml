name: Desktop bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  bundle:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
          - name: macOS Apple Silicon
            runner: macos-latest
          - name: macOS Intel
            runner: macos-15-intel
    env:
      # This is a public endpoint, not a credential. Forks use the same safe default.
      VITE_API_ORIGIN: ${{ vars.TIME_TRACKER_API_ORIGIN || 'https://time-tracker.apps.silver-vine.jp' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        run: pnpm --filter @time-tracker/desktop tauri:build

      - name: Upload unsigned bundle
        uses: actions/upload-artifact@v4
        with:
          name: time-tracker-${{ matrix.name }}
          path: apps/desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error
          retention-days: 14
