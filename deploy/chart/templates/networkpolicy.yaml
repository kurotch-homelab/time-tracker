apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "time-tracker.fullname" . }}
  labels:
    {{- include "time-tracker.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "time-tracker.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.traefikNamespace }}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # OIDC discovery/token exchange requires HTTPS egress to Keycloak.
    - ports:
        - protocol: TCP
          port: 443
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ .Values.database.name }}
      ports:
        - protocol: TCP
          port: 5432
